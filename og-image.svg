<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <radialGradient id="g1" cx="20%" cy="30%" r="60%">
      <stop offset="0%" stop-color="#1a1a1a"/>
      <stop offset="100%" stop-color="#080808"/>
    </radialGradient>
    <radialGradient id="glow1" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="rgba(255,255,255,0.07)"/>
      <stop offset="100%" stop-color="rgba(255,255,255,0)"/>
    </radialGradient>
    <radialGradient id="glow2" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="rgba(255,255,255,0.04)"/>
      <stop offset="100%" stop-color="rgba(255,255,255,0)"/>
    </radialGradient>
  </defs>
  <!-- Background -->
  <rect width="1200" height="630" fill="url(#g1)"/>
  <!-- Glow blobs -->
  <ellipse cx="200" cy="200" rx="380" ry="300" fill="url(#glow1)"/>
  <ellipse cx="1050" cy="480" rx="300" ry="240" fill="url(#glow2)"/>
  <!-- Subtle grid lines -->
  <line x1="0" y1="315" x2="1200" y2="315" stroke="rgba(255,255,255,0.04)" stroke-width="1"/>
  <line x1="600" y1="0" x2="600" y2="630" stroke="rgba(255,255,255,0.04)" stroke-width="1"/>
  <!-- Border frame -->
  <rect x="40" y="40" width="1120" height="550" rx="16" fill="none" stroke="rgba(255,255,255,0.08)" stroke-width="1"/>
  <!-- Logo mark box -->
  <rect x="80" y="80" width="48" height="48" rx="10" fill="rgba(255,255,255,0.06)" stroke="rgba(255,255,255,0.12)" stroke-width="1"/>
  <text x="104" y="114" font-family="system-ui,-apple-system,sans-serif" font-size="26" font-weight="800" fill="white" text-anchor="middle">K</text>
  <!-- Logo wordmark -->
  <text x="144" y="112" font-family="system-ui,-apple-system,sans-serif" font-size="22" font-weight="800" fill="white" letter-spacing="-0.5">Klyro</text>
  <text x="207" y="112" font-family="system-ui,-apple-system,sans-serif" font-size="22" fill="rgba(255,255,255,0.3)">.</text>
  <!-- Badge -->
  <rect x="80" y="200" width="220" height="30" rx="15" fill="rgba(255,255,255,0.06)" stroke="rgba(255,255,255,0.10)" stroke-width="1"/>
  <circle cx="102" cy="215" r="5" fill="#22c55e"/>
  <text x="116" y="220" font-family="system-ui,-apple-system,sans-serif" font-size="12" font-weight="500" fill="rgba(255,255,255,0.6)" letter-spacing="1">AVAILABLE FOR PROJECTS</text>
  <!-- Main headline -->
  <text x="80" y="310" font-family="system-ui,-apple-system,sans-serif" font-size="72" font-weight="800" fill="white" letter-spacing="-2">Landing Pages</text>
  <text x="80" y="395" font-family="system-ui,-apple-system,sans-serif" font-size="72" font-weight="800" fill="white" letter-spacing="-2">That Actually</text>
  <text x="80" y="480" font-family="system-ui,-apple-system,sans-serif" font-size="72" font-weight="800" fill="rgba(255,255,255,0.4)" letter-spacing="-2">Convert.</text>
  <!-- Right side stats -->
  <rect x="820" y="200" width="320" height="240" rx="14" fill="rgba(255,255,255,0.03)" stroke="rgba(255,255,255,0.08)" stroke-width="1"/>
  <!-- Stat 1 -->
  <text x="855" y="252" font-family="system-ui,-apple-system,sans-serif" font-size="36" font-weight="800" fill="white" letter-spacing="-1">40+</text>
  <text x="855" y="272" font-family="system-ui,-apple-system,sans-serif" font-size="12" fill="rgba(255,255,255,0.4)" letter-spacing="0.5">Projects Delivered</text>
  <!-- divider -->
  <line x1="855" y1="295" x2="1110" y2="295" stroke="rgba(255,255,255,0.06)" stroke-width="1"/>
  <!-- Stat 2 -->
  <text x="855" y="337" font-family="system-ui,-apple-system,sans-serif" font-size="36" font-weight="800" fill="white" letter-spacing="-1">98%</text>
  <text x="855" y="357" font-family="system-ui,-apple-system,sans-serif" font-size="12" fill="rgba(255,255,255,0.4)" letter-spacing="0.5">Client Satisfaction</text>
  <!-- divider -->
  <line x1="855" y1="380" x2="1110" y2="380" stroke="rgba(255,255,255,0.06)" stroke-width="1"/>
  <!-- Stat 3 -->
  <text x="855" y="422" font-family="system-ui,-apple-system,sans-serif" font-size="36" font-weight="800" fill="white" letter-spacing="-1">3x</text>
  <text x="855" y="442" font-family="system-ui,-apple-system,sans-serif" font-size="12" fill="rgba(255,255,255,0.4)" letter-spacing="0.5">Avg. Conversion Lift</text>
  <!-- Bottom domain -->
  <text x="80" y="555" font-family="system-ui,-apple-system,sans-serif" font-size="14" fill="rgba(255,255,255,0.25)" letter-spacing="0.5">klyro.design · Solo Web Agency · by Pranav Singh</text>
</svg>
